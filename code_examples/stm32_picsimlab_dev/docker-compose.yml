services:
  stm32-picsimlab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stm32-picsimlab-dev
    restart: unless-stopped
    ports:
      - "6080:6080"       # noVNC（浏览器访问 PicSimLab GUI）
      - "5000:5000"       # PicSimLab 远程控制接口（rcontrol）
    environment:
      - VNC_PW=picsimlab
      - VNC_RESOLUTION=1280x800
      - TZ=Asia/Shanghai
    volumes:
      - stm32-workspace:/workspace
      - stm32-firmware:/firmware

volumes:
  stm32-workspace:
  stm32-firmware:
