site_name: 《机器人系统》课程
site_url: https://robotic.uwis.cn
copyright: 成都信息工程大学 软件工程学院
nav:
  - 首页: index.md
  - 教师简介: instructor.md
  - 课程介绍: intro.md
  - 教学大纲: syllabus.md
  - 课程内容:
      - 第1章 机器人基础: chapter1.md
      - 第2章 CubeMX编程指南: chapter2.md
      - 第3章 PicSimlab仿真开发: chapter3.md
      - 第4章 嵌入式软件设计模式: chapter4.md
  - 参考资料: resources.md
theme:
  name: material
  features:
    - navigation.expand

extra_css:
  - assets/stylesheets/exam-login.css

extra_javascript:
  - assets/javascripts/exam-login.js
  - assets/javascripts/footer-links.js

plugins:
  - search:
      lang:
        - zh
        - en
  - mkdocs_quiz

markdown_extensions:
  - plantuml_markdown:
      server: https://www.plantuml.com/plantuml
      format: png
  - markdown_svgbob:
      tag_type: inline_svg
      bg_color: white
      fg_color: black
      min_char_width: 80
