site_name: 研究生课程《嵌入式系统》
site_url: https://embedded.uwis.cn
copyright: 成都信息工程大学 软件工程学院
nav:
  - 课程简介: index.md
  - 教学大纲: syllabus.md
  - 教师简介: instructor.md
  - 课程内容:
      - 嵌入式系统基础:
        - 第1章 嵌入式系统概述: chapter1.md
        - 第2章 嵌入式软件设计模式: chapter2.md
      - STM32硬件编程:
        - 第3章 STM32单片机编程: chapter3.md
        - 第4章 单片机操作系统（FreeRTOS）: chapter4.md
        - 第5章 STM32定时器与PWM: chapter5.md
        - 第6章 PicSimlab硬件仿真: chapter6.md
      - 传感器与执行器:
        - 第7章 传感器接口编程: chapter7.md
        - 第8章 显示设备编程: chapter8.md
        - 第9章 电机驱动: chapter9.md
      - 嵌入式控制与应用:
        - 第10章 闭环控制与PID: chapter10.md
        - 第11章 嵌入式通信与物联网: chapter11.md
        - 第12章 嵌入式系统综合设计: chapter12.md
  - 课程实验:
      - 第13章 实验一：STM32基础外设实验: chapter13.md
      - 第14章 实验二：传感器与显示综合实验: chapter14.md
      - 第15章 实验三：嵌入式系统综合项目: chapter15.md
  - 附录:
      - 附录A CubeMX编程指南: appendix_a.md
      - 附录B 开发环境配置: appendix_b.md
      - 附录C STM32实践项目集: appendix_c.md
  - 书写规范: contributing.md
  - 参考资料: resources.md
theme:
  name: material
  features:
    - navigation.expand

extra_css:
  - assets/stylesheets/exam-login.css

extra_javascript:
  - assets/javascripts/exam-login.js
  - assets/javascripts/footer-links.js
  - assets/javascripts/lib/mermaid.min.js
  - assets/javascripts/mermaid-init.js
  - assets/javascripts/utterances.js

plugins:
  - search:
      lang:
        - zh
        - en
  - mkdocs_quiz
  - kroki:
      fence_prefix: kroki-
      enable_mermaid: false

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 2-4
  - pymdownx.superfences
  - plantuml_markdown:
      server: https://www.plantuml.com/plantuml
      format: svg
  - markdown_svgbob:
      tag_type: inline_svg
      bg_color: white
      fg_color: black
      min_char_width: 80